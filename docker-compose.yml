services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: maritime
      POSTGRES_USER: maritime
      POSTGRES_PASSWORD: maritime_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - timescale_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maritime -d maritime"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint:
      - sh
      - -c
      - |
        if [ -f /state/anvil-state.json ]; then
          exec anvil --host 0.0.0.0 --port 8545 --block-time 2 \
            --load-state /state/anvil-state.json \
            --dump-state /state/anvil-state.json \
            --state-interval 60
        else
          exec anvil --host 0.0.0.0 --port 8545 --block-time 2 \
            --dump-state /state/anvil-state.json \
            --state-interval 60
        fi
    ports:
      - "127.0.0.1:8545:8545"
    volumes:
      - anvil_state:/state
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8545 > /dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  timescale_data:
  anvil_state:
